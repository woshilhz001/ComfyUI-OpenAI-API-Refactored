log_level: "info"
server:
  host: "0.0.0.0"
  port: 8080

# 多后端列表
comfyui_backends:
  - name: "backend-a"
    host: "127.0.0.1"
    port: 8000
    default: true
  - name: "backend-b"
    host: "192.168.50.181"
    port: 8188
    default: false

comfyui_backend:
  client_id: "comfyui-api"
  workflows_folder: "./workflows"
  use_ws: true               # 设置为 false 可关闭 WebSocket
  input_dir: "./cache"       # 代理本地图片缓存目录

routing:
  timeout_seconds: 3600
  max_payload_size_mb: 500
  Image_Width: 512
  Image_Height: 288
  video_Width: 512
  video_Height: 288
  fps: 8
  free_model_before_video: true

  # 负载均衡策略 (RoundRobin / LeastConnections / Random)
  lb_strategy: "RoundRobin"

  # 令牌桶限流（可选，注释则关闭）
  rate_limit:
    max_tokens: 60
    refill_rate: 1.0

  # 请求级响应缓存（可选，注释则关闭）
  response_cache:
    ttl_secs: 600
    max_entries: 500

  # 是否启用缓存命中（相同提交直接返回缓存结果）
  enable_response_cache: false

  # 幂等键支持
  enable_idempotency: true

  # 优雅关闭等待秒数
  graceful_shutdown_timeout_secs: 30

  # 后端健康检查参数
  health_check_interval_secs: 15
  health_check_fail_threshold: 3